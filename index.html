<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyd Family Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#0f1520;--card:#141c2a;--card2:#1a2436;--border:#1e2d42;--text:#e8edf5;--muted:#5a7090;--green:#28d68a;--red:#ff4d6d;--nolon:#f0a500;--nolon2:#ff6b1a;--denise:#e040a0;--denise2:#9b40e0;--jr:#00c8ff;--jr2:#0077ff;--aubrey:#ff6eb0;--aubrey2:#ff3d7f;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
#lockScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.lock-glow{position:absolute;width:360px;height:360px;background:radial-gradient(circle,rgba(240,165,0,0.1) 0%,transparent 70%);border-radius:50%;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15);opacity:0.7}}
.lock-inner{position:relative;text-align:center;padding:36px 30px;background:var(--surface);border:1px solid var(--border);border-radius:20px;width:320px;}
.lock-icon{font-size:2.4rem;display:block;margin-bottom:12px;}
.lock-title{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:4px;background:linear-gradient(135deg,var(--nolon),var(--denise));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lock-sub{color:var(--muted);font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;margin:4px 0 20px;}
.who-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
.who-btn{padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;color:var(--muted);transition:all 0.2s;text-align:center;}
.who-btn.w-nolon.selected{border-color:var(--nolon);color:var(--nolon);background:rgba(240,165,0,0.1);}
.who-btn.w-denise.selected{border-color:var(--denise);color:var(--denise);background:rgba(224,64,160,0.1);}
.who-btn.w-jr.selected{border-color:var(--jr);color:var(--jr);background:rgba(0,200,255,0.1);}
.who-btn.w-aubrey.selected{border-color:var(--aubrey);color:var(--aubrey);background:rgba(255,110,176,0.1);}
#pwStep{display:none;}
.back-btn{background:none;border:none;color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:'Barlow',sans-serif;margin-bottom:14px;display:flex;align-items:center;gap:4px;}
.who-confirm{font-size:0.8rem;font-weight:600;margin-bottom:14px;padding:8px 12px;border-radius:8px;background:var(--card);}
.lock-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--text);font-size:1.1rem;text-align:center;letter-spacing:6px;outline:none;margin-bottom:12px;transition:border-color 0.2s;font-family:'Barlow',sans-serif;}
.lock-input.err{border-color:var(--red);animation:shake 0.3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.lock-btn{width:100%;background:linear-gradient(135deg,var(--nolon),var(--nolon2));border:none;border-radius:10px;padding:12px;color:#000;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;cursor:pointer;}
.lock-err{color:var(--red);font-size:0.7rem;margin-top:8px;height:14px;}
#app{display:none;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:3px;background:linear-gradient(135deg,var(--nolon),var(--denise));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-user{font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.lock-out{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:0.7rem;cursor:pointer;font-family:'Barlow',sans-serif;}
.lock-out:hover{border-color:var(--red);color:var(--red);}
.person-tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:6px;padding:11px 11px 0;border-bottom:1px solid var(--border);}
.person-tabs::-webkit-scrollbar{display:none;}
.ptab{flex-shrink:0;padding:8px 15px;border-radius:10px 10px 0 0;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:2px;color:var(--muted);border:1px solid transparent;border-bottom:none;transition:all 0.2s;background:var(--surface);}
.ptab.p-nolon.active{color:var(--nolon);border-color:var(--nolon);background:rgba(240,165,0,0.08);}
.ptab.p-denise.active{color:var(--denise);border-color:var(--denise);background:rgba(224,64,160,0.08);}
.ptab.p-jr.active{color:var(--jr);border-color:var(--jr);background:rgba(0,200,255,0.08);}
.ptab.p-aubrey.active{color:var(--aubrey);border-color:var(--aubrey);background:rgba(255,110,176,0.08);}
.ppanel{display:none;padding:12px;}
.ppanel.active{display:block;}
.sub-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.sub-tabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:6px 13px;border-radius:20px;cursor:pointer;font-size:0.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--surface);border:1px solid var(--border);transition:all 0.2s;white-space:nowrap;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:0.92rem;letter-spacing:2px;margin-bottom:11px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 7px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:0.56rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.stat-chg{font-size:0.66rem;font-weight:600;margin-top:2px;}
.good{color:var(--green);}.bad{color:var(--red);}
.prog-label{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--muted);margin-bottom:5px;}
.prog-bg{background:var(--surface);border-radius:20px;height:9px;overflow:hidden;}
.prog-fill{height:100%;border-radius:20px;transition:width 1s ease;}
.goal-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:0.68rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:11px;}
.goal-lose{background:rgba(255,77,109,0.15);color:var(--red);border:1px solid rgba(255,77,109,0.3);}
.goal-gain{background:rgba(40,214,138,0.15);color:var(--green);border:1px solid rgba(40,214,138,0.3);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
.fg.third{grid-column:span 1;}
.flbl{font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.finput{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.83rem;outline:none;transition:border-color 0.2s;width:100%;}
.finput:focus{border-color:var(--nolon);}
.fselect{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.83rem;outline:none;width:100%;}
.btn{width:100%;padding:11px;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:0.92rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
.btn:hover{opacity:0.88;transform:translateY(-1px);}
.btn-nolon{background:linear-gradient(135deg,var(--nolon),var(--nolon2));color:#000;}
.btn-denise{background:linear-gradient(135deg,var(--denise),var(--denise2));color:#fff;}
.btn-jr{background:linear-gradient(135deg,var(--jr),var(--jr2));color:#000;}
.btn-aubrey{background:linear-gradient(135deg,var(--aubrey),var(--aubrey2));color:#fff;}
.btn-sm{padding:7px 14px;font-size:0.78rem;width:auto;letter-spacing:1px;}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:11px;}
.mcrd{background:var(--card2);border-radius:10px;padding:8px 5px;text-align:center;border:1px solid var(--border);}
.mnum{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;line-height:1;}
.mlbl{font-size:0.54rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-top:2px;}
.mbar{height:3px;border-radius:3px;margin-top:5px;background:var(--border);overflow:hidden;}
.mbar-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.ai-row{display:flex;gap:7px;margin-bottom:9px;}
.ai-ta{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.83rem;outline:none;resize:none;min-height:52px;}
.ai-btn{border:none;border-radius:10px;padding:10px 13px;font-family:'Bebas Neue',sans-serif;font-size:0.82rem;letter-spacing:1px;cursor:pointer;align-self:flex-end;white-space:nowrap;}
.ai-btn:disabled{opacity:0.5;cursor:not-allowed;}
.ai-thinking{display:none;text-align:center;padding:10px;color:var(--muted);font-size:0.75rem;}
.ai-thinking.show{display:block;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--nolon);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.mp{font-size:0.6rem;font-weight:600;padding:2px 7px;border-radius:8px;}
.mp-cal{background:rgba(240,165,0,0.15);color:var(--nolon);}
.mp-p{background:rgba(40,214,138,0.15);color:var(--green);}
.mp-c{background:rgba(122,184,232,0.15);color:#7ab8e8;}
.mp-f{background:rgba(255,107,26,0.15);color:var(--nolon2);}
.hist-list{display:flex;flex-direction:column;gap:7px;max-height:240px;overflow-y:auto;}
.hist-item{background:var(--card2);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;}
.hist-date{font-size:0.66rem;color:var(--muted);min-width:70px;}
.hist-wt{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;}
.hist-meta{font-size:0.63rem;color:var(--muted);text-align:right;line-height:1.4;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.72rem;padding:2px 4px;}
.del-btn:hover{color:var(--red);}
.review-box{background:var(--card2);border-radius:12px;padding:13px;margin-top:10px;border-left:4px solid var(--green);}
.review-box.warn{border-left-color:var(--nolon);}
.review-title{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;margin-bottom:7px;}
.review-text{font-size:0.76rem;color:#ccd;line-height:1.6;}
.review-text li{margin-left:14px;margin-bottom:3px;}
.ai-review-btn{width:100%;padding:10px;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;cursor:pointer;margin-top:9px;}
.ai-review-btn:hover{opacity:0.88;}
/* WORKOUT STYLES */
.workout-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;}
.workout-item{background:var(--card2);border-radius:10px;padding:11px 13px;}
.workout-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.workout-name{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:1px;}
.workout-date{font-size:0.65rem;color:var(--muted);}
.sets-list{display:flex;flex-direction:column;gap:4px;}
.set-row{display:flex;gap:8px;align-items:center;font-size:0.75rem;color:#aab;}
.set-num{color:var(--muted);min-width:28px;font-size:0.65rem;}
.pr-badge{background:rgba(255,215,0,0.15);color:gold;border:1px solid rgba(255,215,0,0.3);font-size:0.6rem;font-weight:700;padding:1px 6px;border-radius:8px;letter-spacing:1px;}
.pr-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.pr-item{background:var(--card2);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.pr-exercise{font-size:0.8rem;font-weight:600;}
.pr-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:gold;}
.pr-date{font-size:0.62rem;color:var(--muted);}
/* STEP COUNTER */
.steps-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
.step-day{text-align:center;}
.step-day-lbl{font-size:0.55rem;color:var(--muted);margin-bottom:3px;}
.step-bar-wrap{height:50px;display:flex;align-items:flex-end;justify-content:center;}
.step-bar{width:80%;border-radius:3px 3px 0 0;min-height:3px;transition:height 0.5s;}
.step-val{font-size:0.55rem;color:var(--muted);margin-top:2px;}
/* WATER TRACKER */
.water-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.water-cup{width:38px;height:38px;border-radius:8px;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all 0.2s;}
.water-cup.filled{background:rgba(0,180,255,0.2);border-color:#00b4ff;}
/* SUPPLEMENT LOG */
.supp-list{display:flex;flex-direction:column;gap:7px;}
.supp-item{background:var(--card2);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.supp-name{font-size:0.82rem;font-weight:600;}
.supp-time{font-size:0.65rem;color:var(--muted);}
.supp-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:all 0.2s;}
.supp-check.done{background:var(--green);border-color:var(--green);color:#000;}
/* AI TOOLS */
.ai-tool-result{background:var(--card2);border-radius:10px;padding:13px;margin-top:10px;font-size:0.78rem;line-height:1.6;color:#ccd;display:none;}
.ai-tool-result.show{display:block;}
.ai-tool-result li{margin-left:14px;margin-bottom:3px;}
.plateau-banner{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:10px;padding:11px 13px;margin-bottom:11px;font-size:0.78rem;color:var(--red);display:none;}
.plateau-banner.show{display:block;}
/* FORM CHECK RATING */
.form-rating{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.muscle-tag{padding:5px 12px;border-radius:20px;font-size:0.7rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--muted);transition:all 0.2s;}
.muscle-tag.selected{border-color:var(--nolon);color:var(--nolon);background:rgba(240,165,0,0.1);}
.setup-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:11px;}
.setup-card h3{font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:2px;margin-bottom:11px;color:var(--muted);}
.med-badge{display:inline-block;font-size:0.58rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:10px;}
.empty-state{color:var(--muted);font-size:0.76rem;text-align:center;padding:16px 0;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;font-family:'Barlow',sans-serif;font-size:0.78rem;font-weight:600;padding:8px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;z-index:9998;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lock-glow"></div>
  <div class="lock-inner">
    <span class="lock-icon">🔐</span>
    <div class="lock-title">Boyd Family</div>
    <div class="lock-sub">Health Tracker</div>
    <div id="whoStep">
      <div class="who-label">Who are you?</div>
      <div class="who-grid">
        <div class="who-btn w-nolon" onclick="selectWho('nolon')">🔥 Nolon</div>
        <div class="who-btn w-denise" onclick="selectWho('denise')">💜 Denise</div>
        <div class="who-btn w-jr" onclick="selectWho('jr')">⚡ Jr</div>
        <div class="who-btn w-aubrey" onclick="selectWho('aubrey')">🌸 Aubrey</div>
      </div>
    </div>
    <div id="pwStep">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <div class="who-confirm" id="whoConfirm"></div>
      <input type="password" class="lock-input" id="lockInput" placeholder="• • • •" maxlength="10">
      <button class="lock-btn" id="unlockBtn" onclick="tryUnlock()">UNLOCK</button>
      <div class="lock-err" id="lockErr"></div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div>
      <div class="hdr-title">🏋🏾 Boyd Family Tracker</div>
      <div class="hdr-user" id="hdrUser"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <div style="font-size:0.65rem;color:var(--muted);" id="hdrDate"></div>
      <button class="lock-out" onclick="lockApp()">🔒 Lock</button>
    </div>
  </header>
  <div class="person-tabs" id="personTabs"></div>
  <div id="personPanels"></div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const PW = '1740';
const MEMBERS = [
  {id:'nolon', name:'Nolon', emoji:'🔥', cls:'nolon', goal:'lose', startWeight:508, goalWeight:200, medication:'Retatrutide 1.25mg', calTarget:1750, pTarget:197, cTarget:131, fTarget:49, isTeen:false, isAdult:true, dailyLog:true},
  {id:'denise',name:'Denise',emoji:'💜',cls:'denise',goal:'lose',startWeight:null,goalWeight:null,medication:'',calTarget:1500,pTarget:150,cTarget:120,fTarget:50,isTeen:false,isAdult:true,dailyLog:false},
  {id:'jr',    name:'Jr',    emoji:'⚡',cls:'jr',    goal:'gain',startWeight:null,goalWeight:null,medication:'',calTarget:2500,pTarget:160,cTarget:280,fTarget:80, isTeen:true, isAdult:false,dailyLog:false},
  {id:'aubrey',name:'Aubrey',emoji:'🌸',cls:'aubrey',goal:'lose',startWeight:null,goalWeight:null,medication:'',calTarget:1600,pTarget:120,cTarget:160,fTarget:55,isTeen:true, isAdult:false,dailyLog:false},
];
const ACCESS = {nolon:['nolon','denise','jr','aubrey'],denise:['nolon','denise','jr','aubrey'],jr:['jr'],aubrey:['aubrey']};
const KEYS = {data:function(id){return 'boyd_'+id+'_v3';},targets:function(id){return 'boyd_'+id+'_targets_v2';},workouts:function(id){return 'boyd_'+id+'_workouts_v1';},steps:function(id){return 'boyd_'+id+'_steps_v1';},steps:function(id){return 'boyd_'+id+'_steps_v1';}};
const MUSCLE_GROUPS = ['Chest','Back','Shoulders','Biceps','Triceps','Core','Legs','Glutes','Cardio','Full Body'];
const EXERCISES = {Chest:['Bench Press','Incline Press','Push-Ups','Cable Fly','Dips'],Back:['Deadlift','Pull-Ups','Barbell Row','Lat Pulldown','Seated Row'],Shoulders:['Overhead Press','Lateral Raise','Front Raise','Face Pull','Shrugs'],Biceps:['Barbell Curl','Hammer Curl','Preacher Curl','Cable Curl'],Triceps:['Skull Crushers','Tricep Pushdown','Close Grip Press','Dips'],Core:['Plank','Crunches','Leg Raise','Cable Crunch','Ab Wheel'],Legs:['Squat','Leg Press','Romanian Deadlift','Leg Curl','Leg Extension','Calf Raise'],Glutes:['Hip Thrust','Glute Bridge','Bulgarian Split Squat','Kickbacks'],Cardio:['Treadmill','Elliptical','Bike','Stair Master','Jump Rope'],FullBody:['Clean and Press','Kettlebell Swing','Burpees','Thrusters']};

let charts = {};
let activePerson = null;
let currentUser = null;
let selectedWho = null;
let selectedMuscles = {};

// ── AUTH ──
function selectWho(id) {
  selectedWho = id;
  document.querySelectorAll('.who-btn').forEach(function(b){b.classList.remove('selected');});
  document.querySelector('.w-'+id).classList.add('selected');
  var m = MEMBERS.find(function(x){return x.id===id;});
  setTimeout(function(){
    document.getElementById('whoStep').style.display='none';
    document.getElementById('pwStep').style.display='block';
    document.getElementById('whoConfirm').innerHTML='<span style="color:var(--'+m.cls+')">'+m.emoji+' '+m.name+'</span> — enter your password';

function goBack(){selectedWho=null;document.getElementById('pwStep').style.display='none';document.getElementById('whoStep').style.display='block';document.getElementById('lockInput').value='';document.getElementById('lockErr').textContent='';document.querySelectorAll('.who-btn').forEach(function(b){b.classList.remove('selected');});}
function tryUnlock(){
  var v=document.getElementById('lockInput').value;
  var inp=document.getElementById('lockInput');
  if(!selectedWho){goBack();return;}
  if(v===PW){
    currentUser=selectedWho;
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='block';
    buildApp();initApp();
  }else{
    inp.classList.add('err');document.getElementById('lockErr').textContent='Incorrect password.';inp.value='';
    setTimeout(function(){inp.classList.remove('err');},400);
  }
}
function lockApp(){
  currentUser=null;selectedWho=null;
  document.getElementById('app').style.display='none';
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('lockInput').value='';document.getElementById('lockErr').textContent='';
  document.getElementById('whoStep').style.display='block';document.getElementById('pwStep').style.display='none';
  document.querySelectorAll('.who-btn').forEach(function(b){b.classList.remove('selected');});
  Object.values(charts).forEach(function(c){try{c.destroy();}catch(e){}});charts={};
  document.getElementById('personTabs').innerHTML='';document.getElementById('personPanels').innerHTML='';
}
document.getElementById('lockInput').addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});

function buildApp(){
  var tabs=document.getElementById('personTabs');
  var panels=document.getElementById('personPanels');
  tabs.innerHTML='';panels.innerHTML='';
  var allowed=ACCESS[currentUser]||[currentUser];
  var visible=MEMBERS.filter(function(m){return allowed.includes(m.id);});
  visible.forEach(function(m,i){
    var tab=document.createElement('div');
    tab.className='ptab p-'+m.cls+(i===0?' active':'');
    tab.id='ptab-'+m.id;tab.innerHTML=m.emoji+' '+m.name;

}

  });
}

// ── SETUP ──
function saveSetup(id){
  var sw=parseFloat(document.getElementById(id+'-sw').value);
  var gw=parseFloat(document.getElementById(id+'-gw').value);
  var medEl=document.getElementById(id+'-med');var med=medEl?medEl.value.trim():'';
  if(!sw||!gw){showToast('Enter both weights!',true);return;}
  var ex=getData(id)||{};
  saveData(id,Object.assign({},ex,{startWeight:sw,goalWeight:gw,medication:med,entries:ex.entries||[]}));
  loadPerson(id);showToast('Profile saved!');
}

function loadPerson(id){
  var d=getData(id);
  if(id==='nolon'&&(!d||!d.startWeight)){saveData('nolon',{startWeight:508,goalWeight:200,medication:'Retatrutide 1.25mg',entries:[]});d=getData('nolon');}
  var setupEl=document.getElementById(id+'-setup');
  var mainEl=document.getElementById(id+'-main');
  if(!setupEl||!mainEl)return;
  if(!d||!d.startWeight){setupEl.style.display='block';mainEl.style.display='none';}
  else{setupEl.style.display='none';mainEl.style.display='block';renderPerson(id,d);}
}

function renderPerson(id,d){
  var m=MEMBERS.find(function(x){return x.id===id;});
  var entries=d.entries||[];
  var sorted=entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var latest=sorted.length?sorted[sorted.length-1]:null;
  var prev=sorted.length>1?sorted[sorted.length-2]:null;
  var cur=latest?latest.weight:d.startWeight;
  var isGain=m.goal==='gain';
  var delta=isGain?Math.max(0,cur-d.startWeight):Math.max(0,d.startWeight-cur);
  var toGo=isGain?Math.max(0,d.goalWeight-cur):Math.max(0,cur-d.goalWeight);
  var totalNeeded=Math.abs(d.goalWeight-d.startWeight);
  var pct=totalNeeded>0?Math.min(100,Math.max(0,delta/totalNeeded*100)).toFixed(1):0;

  function s(elId,val){var el=document.getElementById(elId);if(el)el.textContent=val;}
  s(id+'-cur',cur);s(id+'-delta',delta.toFixed(1));s(id+'-togo',toGo.toFixed(1));
  s(id+'-pct',pct+'% of goal');s(id+'-pctlbl',pct+'%');
  s(id+'-sd',d.startWeight+' lbs');s(id+'-gd',d.goalWeight+' lbs');
  var barEl=document.getElementById(id+'-bar');if(barEl)barEl.style.width=pct+'%';

  if(latest&&prev){
    var diff=(prev.weight-latest.weight).toFixed(1);
    var el=document.getElementById(id+'-wchg');
    if(el&&diff!=0){var improved=isGain?diff<0:diff>0;el.textContent=diff>0?'▼ '+Math.abs(diff)+' lbs':'▲ '+Math.abs(diff)+' lbs';el.className='stat-chg '+(improved?'good':'bad');}
  }
  var medbEl=document.getElementById(id+'-medb');
  if(medbEl&&d.medication)medbEl.innerHTML='<span class="med-badge" style="background:rgba(240,165,0,0.1);color:var(--'+m.cls+');border:1px solid rgba(240,165,0,0.2);">'+d.medication+'</span>';

  // Plateau detection
  if(!isGain&&sorted.length>=2){
    var last10=sorted.slice(-10);
    var minW=Math.min.apply(null,last10.map(function(e){return e.weight;}));
    var maxW=Math.max.apply(null,last10.map(function(e){return e.weight;}));
    var pb=document.getElementById(id+'-plateau-banner');
    if(pb&&last10.length>=7&&(maxW-minW)<1.5)pb.classList.add('show');
    else if(pb)pb.classList.remove('show');
  }

  renderWeightChart(id,sorted);
  if(!m.isTeen)renderBPChart(id,sorted);
  renderHistory(id,sorted,isGain);
  if(m.dailyLog)renderDailyStatus(id,sorted);
}

function renderWeightChart(id,sorted){
  var ctx=document.getElementById(id+'-chart');if(!ctx)return;
  var c=getColor(id);
  var labels=sorted.map(function(e){return new Date(e.date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});});

  var prompt='You are a nutrition coach. Build a full day meal plan using only these ingredients: '+text+'\n'
    +'TARGETS: '+t.cal+' calories | '+t.p+'g protein | '+t.c+'g carbs | '+t.f+'g fat\n'
    +'GOAL: '+(m.goal==='gain'?'muscle gain':'weight loss')+' | Person: '+m.name+'\n'
    +'Create 4 meals (breakfast, lunch, dinner, snack). For each meal list: meal name, ingredients with portions, and macros. Show daily totals at the end. Make it practical and delicious.';
  await callAI(prompt,id+'-mealgen-thinking',id+'-mealgen-result');
}

async function formChecker(id){
  var ex=document.getElementById(id+'-form-ex');if(!ex||!ex.value.trim()){showToast('Enter an exercise name!',true);return;}
  var m=MEMBERS.find(function(x){return x.id===id;});
  var prompt='You are a certified personal trainer and physical therapist. Explain proper form for: '+ex.value.trim()+'\n'
    +'This is for '+m.name+' who is a '+m.goal+' goal athlete.\n'
    +'Cover: 1) Starting position/setup 2) The movement step by step 3) Breathing pattern 4) Most common mistakes 5) Injury prevention cues 6) Beginner modifications 7) Advanced variations. Be practical and clear.';
  await callAI(prompt,id+'-form-thinking',id+'-form-result');
}

async function medAdvisor(id){
  var inp=document.getElementById(id+'-med-in');if(!inp||!inp.value.trim()){showToast('Type your question first!',true);return;}
  var d=getData(id);
  var prompt='You are a knowledgeable health advisor familiar with GLP-1 medications and weight loss drugs. The user is taking: '+(d&&d.medication?d.medication:'retatrutide')+'\n'
    +'Current weight: '+(d&&d.entries&&d.entries.length?d.entries[d.entries.length-1].weight:d&&d.startWeight?d.startWeight:'unknown')+'lbs | Goal: '+(d&&d.goalWeight?d.goalWeight:'unknown')+'lbs\n'
    +'Question: '+inp.value.trim()+'\n'
    +'Give helpful, accurate information. Always remind them to consult their prescribing physician for medical decisions. Be practical and informative.';
  await callAI(prompt,id+'-med-thinking',id+'-med-result');
}

// ── TOAST ──
function showToast(msg,isErr){isErr=isErr||false;var t=document.getElementById('toast');t.textContent=msg;t.style.background=isErr?'var(--red)':'var(--green)';t.style.color=isErr?'#fff':'#000';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
</script>
